<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giftback Admin — protótipo (cards / CTA)</title>
    <link rel="stylesheet" href="assets/css/prototype-theme.css" />
  </head>
  <body class="gb-prototype">
    <div class="header navbar navbar-fixed-top" role="banner">
      <div class="header-inner">
        <ul class="nav navbar-nav pull-right">
          <li class="dropdown user">
            <a
              class="dropdown-toggle"
              href="#"
              data-toggle="dropdown"
              aria-expanded="false"
              aria-haspopup="true"
            >
              <span class="avatar" aria-hidden="true"></span>
              <span class="username">Hugo Branco (Simples,Modulos)</span>
              <b class="caret"></b>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="page-container">
      <div class="page-sidebar-wrapper">
        <div class="page-sidebar navbar-collapse collapse" id="page-sidebar">
          <div class="page-sidebar-toolbar">
            <button
              type="button"
              class="sidebar-toggler"
              aria-controls="page-sidebar"
              aria-expanded="true"
              title="Recolher menu"
            >
              <span class="sidebar-toggler-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Alternar menu lateral</span>
            </button>
          </div>
          <div class="slimScrollDiv">
            <ul class="page-sidebar-menu">
              <li class="start active">
                <a href="/sistema/marcas">
                  <i class="menu-item-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                      <path
                        d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                      />
                    </svg>
                  </i>
                  <span class="title" data-sidebar-label>Marcas</span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="page-content-wrapper">
        <div id="cards-demo-content">
          <div class="page-content">
            <h1 class="page-title">Exemplo de cards</h1>

            <nav class="page-breadcrumb" aria-label="Navegação em trilha">
              <a href="/sistema/dashboard" class="page-breadcrumb__home" aria-label="Início">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
              </a>
              <span class="sep">›</span>
              <a href="/sistema/dashboard">Tela Inicial</a>
              <span class="sep">›</span>
              <span class="is-current" aria-current="page">Cards</span>
            </nav>

            <section class="sb-cta" aria-labelledby="sb-cta-title">
              <h2 id="sb-cta-title">Faça uma ação, e-commerce ou engajamento</h2>
              <div class="row cards">
                <div class="col-xs-12 col-sm-12 col-md-12 col-lg-3">
                  <article class="card">
                    <div class="card__head">
                      <div class="card__icon" aria-hidden="true">%</div>
                      <h3 class="card__title">Ação de campanha</h3>
                    </div>
                    <p class="card__text">
                      Envie uma base para configurar ações como AMGM, Aniversário, Reativação…
                      <strong>(com geração de bônus).</strong>
                    </p>
                    <button type="button" class="btn btn-primary card__action">Nova ação</button>
                  </article>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/prototype-sidebar.js"></script>
  </body>
</html>
